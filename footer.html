<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="footer.css">
<footer class="footer" id="footer-background">
    <div class="footer-container">
        <div class="footer-content">
            <div class="footer-contact">
                <h3 class="footer-title">Expert Toiture</h3>
                <p class="footer-subtitle">Votre partenaire de confiance pour un toit sain et durable.</p>
                <div class="footer-badges">
                    <div class="cert-badge">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span>Garantie Décennale</span>
                    </div>
                    <div class="cert-badge google">
                        <i class="fa-brands fa-google"></i>
                        <span>Google Certifié</span>
                    </div>
                </div>
                <div class="contact-info">
                    <div class="contact-item">
                        <h4 class="contact-label">Email</h4>
                        <p class="contact-text"><a href="mailto:contact@expert-toiture.com" id="email_address"
                                style="color: inherit; text-decoration: none;">contact@expert-toiture.com</a></p>
                    </div>
                    <div class="contact-item">
                        <h4 class="contact-label">Téléphone</h4>
                        <p class="contact-text"><a href="tel:06 58 74 07 47" id="phone_number"
                                style="color: inherit; text-decoration: none;">06 58 74 07 47</a></p>
                    </div>
                </div>
            </div>
            <div class="footer-form">
                <form class="footer-form-content">
                    <div class="footer-form-group">
                        <label class="footer-form-label" for="footer-email">Votre Email</label>
                        <input class="footer-form-input" id="footer-email" name="email"
                            placeholder="votre.email@exemple.com" required="" type="email" />
                    </div>
                    <button class="footer-submit-button" type="submit" id="footer-button" style="margin-top: 10px;">Envoyer votre
                        demande</button>
                </form>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="copyright">© 2025. Tous droits réservés.</p>
        </div>
    </div>
</footer>
